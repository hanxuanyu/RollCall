name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            desktop: true
          - os: macos-latest
            goos: darwin
            goarch: arm64
            desktop: true
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            desktop: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMMIT_ID=$(git rev-parse --short HEAD)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT_ID}" >> "$GITHUB_OUTPUT"
          echo "ldflags=-X RollCall/internal/version.Version=${TAG} -X RollCall/internal/version.CommitID=${COMMIT_ID}" >> "$GITHUB_OUTPUT"

      - name: Install Wails
        if: matrix.desktop
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # --- Desktop build ---
      - name: Build desktop (Windows)
        if: matrix.goos == 'windows' && matrix.desktop
        shell: bash
        run: wails build -ldflags "${{ steps.version.outputs.ldflags }}"

      - name: Build desktop (macOS)
        if: matrix.goos == 'darwin' && matrix.desktop
        shell: bash
        run: wails build -ldflags "${{ steps.version.outputs.ldflags }}"

      # --- Server build ---
      - name: Build server
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -tags server \
            -ldflags "${{ steps.version.outputs.ldflags }}" \
            -o "build/bin/rollcall-server${EXT}" .

      # --- Package desktop ---
      - name: Package desktop (Windows)
        if: matrix.goos == 'windows' && matrix.desktop
        shell: bash
        run: |
          cd build/bin
          7z a ../../rollcall-desktop-windows.zip rollcall.exe

      - name: Package desktop (macOS)
        if: matrix.goos == 'darwin' && matrix.desktop
        shell: bash
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "rollcall" \
            --no-internet-enable \
            "rollcall-desktop-macos.dmg" \
            "build/bin/rollcall.app" || true
          if [ ! -f rollcall-desktop-macos.dmg ]; then
            cd build/bin && tar czf ../../rollcall-desktop-macos.tar.gz rollcall.app
          fi

      # --- Package server ---
      - name: Package server (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          cd build/bin
          7z a ../../rollcall-server-windows.zip rollcall-server.exe

      - name: Package server (macOS)
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          chmod +x build/bin/rollcall-server
          cd build/bin && tar czf ../../rollcall-server-macos.tar.gz rollcall-server

      - name: Package server (Linux)
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          chmod +x build/bin/rollcall-server
          cd build/bin && tar czf ../../rollcall-server-linux.tar.gz rollcall-server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollcall-${{ matrix.goos }}
          path: |
            rollcall-*.zip
            rollcall-*.tar.gz
            rollcall-*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rollcall-*.zip
            rollcall-*.tar.gz
            rollcall-*.dmg
          generate_release_notes: true
